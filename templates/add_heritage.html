{% extends "base.html" %}

{% block title %}Add Heritage Site - Digital Catalyst{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card-custom">
                <div class="card-header-custom">
                    <i class="bi bi-plus-circle me-2"></i>Add New Heritage Site
                </div>
                <div class="card-body-custom">
                    <form method="POST" action="{{ url_for('add_heritage') }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label form-label-custom">Site Name *</label>
                            <input type="text" class="form-control form-control-custom" id="name" name="name" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="state" class="form-label form-label-custom">State *</label>
                                <input type="text" class="form-control form-control-custom" id="state" name="state" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label form-label-custom">Category *</label>
                                <select class="form-control form-control-custom" id="category" name="category" required>
                                    <option value="">Select Category</option>
                                    <option value="Monument">Monument</option>
                                    <option value="Fort">Fort</option>
                                    <option value="Temple">Temple</option>
                                    <option value="Palace">Palace</option>
                                    <option value="Archaeological Site">Archaeological Site</option>
                                    <option value="Cave Temple">Cave Temple</option>
                                    <option value="Museum">Museum</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="annual_visitors" class="form-label form-label-custom">Annual Visitors</label>
                            <input type="number" class="form-control form-control-custom" id="annual_visitors" 
                                   name="annual_visitors" min="0" value="0">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="latitude" class="form-label form-label-custom">Latitude</label>
                                <input type="number" step="0.000001" class="form-control form-control-custom" 
                                       id="latitude" name="latitude" placeholder="e.g., 28.6139">
                                <small class="text-muted">Geographic latitude for map display</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="longitude" class="form-label form-label-custom">Longitude</label>
                                <input type="number" step="0.000001" class="form-control form-control-custom" 
                                       id="longitude" name="longitude" placeholder="e.g., 77.2090">
                                <small class="text-muted">Geographic longitude for map display</small>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="image" class="form-label form-label-custom">Upload Image</label>
                            <input type="file" class="form-control form-control-custom" id="image" name="image" accept="image/*">
                            <small class="text-muted">Allowed: PNG, JPG, JPEG, GIF, WEBP (Max 5MB)</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="image_url" class="form-label form-label-custom">Or Image URL</label>
                            <input type="url" class="form-control form-control-custom" id="image_url" name="image_url" 
                                   placeholder="https://example.com/image.jpg (optional)">
                        </div>
                        
                        <div class="mb-4">
                            <label for="description" class="form-label form-label-custom">Description</label>
                            <textarea class="form-control form-control-custom" id="description" name="description" 
                                      rows="4" placeholder="Brief description of the heritage site..."></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-custom-primary">
                                <i class="bi bi-save me-2"></i>Add Heritage Site
                            </button>
                            <a href="{{ url_for('heritage_list') }}" class="btn btn-custom-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
