{% extends "base.html" %}

{% block title %}Edit Artisan - Digital Catalyst{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card-custom">
                <div class="card-header-custom">
                    <i class="bi bi-pencil me-2"></i>Edit Artisan
                </div>
                <div class="card-body-custom">
                    <form method="POST" action="{{ url_for('edit_artisan', id=artisan.id) }}">
                        <div class="mb-3">
                            <label for="name" class="form-label form-label-custom">Artisan Name *</label>
                            <input type="text" class="form-control form-control-custom" id="name" name="name" 
                                   value="{{ artisan.name }}" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="craft" class="form-label form-label-custom">Craft Type *</label>
                                <select class="form-control form-control-custom" id="craft" name="craft" required>
                                    <option value="">Select Craft</option>
                                    <option value="Pottery" {% if artisan.craft == 'Pottery' %}selected{% endif %}>Pottery</option>
                                    <option value="Weaving" {% if artisan.craft == 'Weaving' %}selected{% endif %}>Weaving</option>
                                    <option value="Metalwork" {% if artisan.craft == 'Metalwork' %}selected{% endif %}>Metalwork</option>
                                    <option value="Embroidery" {% if artisan.craft == 'Embroidery' %}selected{% endif %}>Embroidery</option>
                                    <option value="Wood Carving" {% if artisan.craft == 'Wood Carving' %}selected{% endif %}>Wood Carving</option>
                                    <option value="Painting" {% if artisan.craft == 'Painting' %}selected{% endif %}>Painting</option>
                                    <option value="Jewelry Making" {% if artisan.craft == 'Jewelry Making' %}selected{% endif %}>Jewelry Making</option>
                                    <option value="Basket Weaving" {% if artisan.craft == 'Basket Weaving' %}selected{% endif %}>Basket Weaving</option>
                                    <option value="Textile" {% if artisan.craft == 'Textile' %}selected{% endif %}>Textile</option>
                                    <option value="Stone Carving" {% if artisan.craft == 'Stone Carving' %}selected{% endif %}>Stone Carving</option>
                                    <option value="Other" {% if artisan.craft == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="state" class="form-label form-label-custom">State *</label>
                                <input type="text" class="form-control form-control-custom" id="state" name="state" 
                                       value="{{ artisan.state }}" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="product_price" class="form-label form-label-custom">Product Price (₹) *</label>
                                <input type="number" class="form-control form-control-custom" id="product_price" 
                                       name="product_price" min="0" step="0.01" value="{{ artisan.product_price }}" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="contact" class="form-label form-label-custom">Contact Number</label>
                                <input type="text" class="form-control form-control-custom" id="contact" name="contact" 
                                       value="{{ artisan.contact }}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="image_url" class="form-label form-label-custom">Image / Product URL</label>
                            <input type="url" class="form-control form-control-custom" id="image_url" name="image_url" 
                                   value="{{ artisan.image_url or '' }}" placeholder="https://example.com/product.jpg (optional)">
                        </div>
                        
                        <div class="mb-4">
                            <label for="description" class="form-label form-label-custom">Description</label>
                            <textarea class="form-control form-control-custom" id="description" name="description" 
                                      rows="4">{{ artisan.description }}</textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-custom-primary">
                                <i class="bi bi-save me-2"></i>Update Artisan
                            </button>
                            <a href="{{ url_for('artisan_list') }}" class="btn btn-custom-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
