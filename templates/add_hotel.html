{% extends "base.html" %}

{% block title %}Add Hotel - Digital Catalyst{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('heritage_detail', id=heritage_site.id) }}">{{ heritage_site.name }}</a></li>
            <li class="breadcrumb-item active" aria-current="page">Add Hotel</li>
        </ol>
    </nav>
    
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card-custom">
                <div class="card-header-custom">
                    <i class="bi bi-building me-2"></i>Add New Hotel Near {{ heritage_site.name }}
                </div>
                <div class="card-body-custom">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label form-label-custom">Hotel Name *</label>
                            <input type="text" class="form-control form-control-custom" id="name" name="name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="location" class="form-label form-label-custom">Full Address *</label>
                            <input type="text" class="form-control form-control-custom" id="location" name="location" 
                                   placeholder="Street, City, State, PIN" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="state" class="form-label form-label-custom">State *</label>
                                <input type="text" class="form-control form-control-custom" id="state" name="state" 
                                       value="{{ heritage_site.state }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="price_per_night" class="form-label form-label-custom">Price Per Night (₹) *</label>
                                <input type="number" step="0.01" class="form-control form-control-custom" 
                                       id="price_per_night" name="price_per_night" min="0" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="rating" class="form-label form-label-custom">Rating (1.0 - 5.0)</label>
                            <input type="number" step="0.1" class="form-control form-control-custom" 
                                   id="rating" name="rating" min="1.0" max="5.0" placeholder="Optional">
                        </div>
                        
                        <div class="mb-3">
                            <label for="image" class="form-label form-label-custom">Hotel Image URL</label>
                            <input type="url" class="form-control form-control-custom" id="image" name="image" 
                                   placeholder="https://example.com/hotel-image.jpg (optional)">
                        </div>
                        
                        <div class="mb-4">
                            <label for="description" class="form-label form-label-custom">Description</label>
                            <textarea class="form-control form-control-custom" id="description" name="description" 
                                      rows="4" placeholder="Brief description of the hotel and its amenities..."></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-custom-primary">
                                <i class="bi bi-save me-2"></i>Add Hotel
                            </button>
                            <a href="{{ url_for('heritage_detail', id=heritage_site.id) }}" class="btn btn-custom-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
