{% extends "base.html" %}

{% block title %}Register - Digital Catalyst{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="bi bi-hexagon-fill"></i>
            <h1 class="auth-title">Join Digital Catalyst</h1>
            <p class="auth-subtitle">Create your account</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="username" class="form-label form-label-custom">Username</label>
                <input type="text" class="form-control form-control-custom" id="username" name="username" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label form-label-custom">Email</label>
                <input type="email" class="form-control form-control-custom" id="email" name="email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label form-label-custom">Password</label>
                <input type="password" class="form-control form-control-custom" id="password" name="password" required>
            </div>
            <div class="mb-4">
                <label for="role" class="form-label form-label-custom">Account type</label>
                <select class="form-select form-control-custom" id="role" name="role">
                    <option value="user">Regular user</option>
                    <option value="manufacturer">Manufacturer</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-custom-primary w-100 mb-3">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
            
            <div class="text-center">
                <p class="mb-0">Already have an account? 
                    <a href="{{ url_for('login') }}" class="text-accent" style="font-weight: 600;">Sign in here</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
