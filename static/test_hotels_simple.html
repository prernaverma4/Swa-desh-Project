<!DOCTYPE html>
<html>
<head>
    <title>Hotel Loading Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body { padding: 20px; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-left: 3px solid #007bff; font-family: monospace; font-size: 12px; }
        .error { border-left-color: #dc3545; background: #f8d7da; }
        .success { border-left-color: #28a745; background: #d4edda; }
        .hotel-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hotel Loading Diagnostic</h1>
        <p>This page tests if hotels can be loaded from the API</p>
        
        <button class="btn btn-primary" onclick="testAPI()">Test API</button>
        <button class="btn btn-success" onclick="loadHotels()">Load Hotels</button>
        <button class="btn btn-secondary" onclick="clearLogs()">Clear Logs</button>
        
        <h3 class="mt-4">Console Logs:</h3>
        <div id="logs"></div>
        
        <h3 class="mt-4">Hotels:</h3>
        <div id="hotels"></div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const logDiv = document.createElement('div');
            logDiv.className = 'log ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
            logDiv.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            logs.appendChild(logDiv);
            console.log(message);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            document.getElementById('hotels').innerHTML = '';
        }
        
        function testAPI() {
            log('Testing API connection...');
            fetch('/api/hotels/all')
                .then(response => {
                    log('API responded with status: ' + response.status, response.ok ? 'success' : 'error');
                    return response.json();
                })
                .then(data => {
                    log('API returned ' + data.hotel_count + ' hotels', 'success');
                    log('Sample hotel: ' + (data.hotels[0] ? data.hotels[0].name : 'none'));
                })
                .catch(error => {
                    log('API ERROR: ' + error.message, 'error');
                });
        }
        
        function loadHotels() {
            log('Loading hotels...');
            const hotelsDiv = document.getElementById('hotels');
            hotelsDiv.innerHTML = '<div class="spinner-border text-primary" role="status"></div>';
            
            fetch('/api/hotels/all')
                .then(response => {
                    log('Fetch successful, status: ' + response.status);
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    log('Received data with ' + data.hotel_count + ' hotels', 'success');
                    
                    if (data.hotels && data.hotels.length > 0) {
                        let html = '';
                        data.hotels.forEach(hotel => {
                            html += `
                                <div class="hotel-card">
                                    <h5>${hotel.name}</h5>
                                    <p><i class="bi bi-geo-alt"></i> ${hotel.location}</p>
                                    <p><i class="bi bi-pin-map"></i> Near: ${hotel.heritage_name}</p>
                                    <p><strong>₹${hotel.price_per_night.toLocaleString()}</strong> / night</p>
                                    ${hotel.rating ? '<p><i class="bi bi-star-fill text-warning"></i> ' + hotel.rating + '</p>' : ''}
                                    <a href="/hotel/book/${hotel.id}" class="btn btn-primary btn-sm">Book Now</a>
                                </div>
                            `;
                        });
                        hotelsDiv.innerHTML = html;
                        log('Hotels rendered successfully!', 'success');
                    } else {
                        hotelsDiv.innerHTML = '<div class="alert alert-warning">No hotels found</div>';
                        log('No hotels in response', 'error');
                    }
                })
                .catch(error => {
                    log('ERROR loading hotels: ' + error.message, 'error');
                    hotelsDiv.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
                });
        }
        
        // Auto-test on load
        window.onload = function() {
            log('Page loaded, ready to test');
            testAPI();
        };
    </script>
</body>
</html>
